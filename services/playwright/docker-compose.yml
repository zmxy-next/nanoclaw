services:
  playwright-mcp:
    build: .
    ports:
      - "8080:8080"   # Playwright MCP SSE
      - "5900:5900"   # VNC
      - "3001:3001"   # noVNC web client
    environment:
      - DISPLAY=:99
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://localhost:8080/mcp | grep -q 400"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
